services:
  kronos:
    build: .
    # Native ARM64 on M4 Mac. Change to linux/amd64 if deploying to cloud.
    platform: linux/arm64
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Model weights persist here across rebuilds — first run downloads ~600 MB
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Kronos-small needs ~2-3 GB; 6 GB gives comfortable headroom
          memory: 6G

volumes:
  hf-cache:
