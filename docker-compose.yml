services:
  kronos:
    build: .
    # Native ARM64 on M4 Mac. Change to linux/amd64 if deploying to cloud.
    platform: linux/arm64
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HF_HUB_DISABLE_SSL_VERIFY=1
    volumes:
      # Mount local model files to bypass download
      - ./models:/models
      # Model weights persist here across rebuilds — first run downloads ~600 MB
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # mini: ~1 GB, small: ~2 GB, base: ~2-3 GB
          memory: 6G

volumes:
  hf-cache:
